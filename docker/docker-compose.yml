version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eatnow-postgres
    environment:
      POSTGRES_DB: eatnow_db
      POSTGRES_USER: eatnow_user
      POSTGRES_PASSWORD: eatnow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eatnow-network

  redis:
    image: redis:7-alpine
    container_name: eatnow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eatnow-network

volumes:
  postgres_data:
  redis_data:

networks:
  eatnow-network:
    driver: bridge
